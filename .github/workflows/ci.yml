name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Types (mypy)
        run: uv run mypy app
      - name: Tests (pytest)
        run: uv run pytest -q
      - name: Export OpenAPI
        run: uv run python -m scripts.export_openapi
      - name: Upload OpenAPI schema
        uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: backend/openapi.json

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Download OpenAPI schema
        uses: actions/download-artifact@v4
        with:
          name: openapi
          path: backend
      - name: Generate TS types from OpenAPI
        run: npx --yes openapi-typescript ../backend/openapi.json -o src/api/schema.d.ts
      - name: Lint (eslint)
        run: npm run lint
      - name: Format check (prettier)
        run: npm run format:check
      - name: Typecheck (tsc)
        run: npm run typecheck
      - name: Build
        run: npm run build
