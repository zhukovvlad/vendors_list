# Alembic: raw-SQL migrations (op.execute); autogenerate is NOT used.
# The DB URL is taken from the environment in migrations/env.py (DATABASE_URL_SYNC).
# NOTE: keep this file ASCII-only -- configparser reads it in the OS locale
# encoding (cp1251 on Windows) and non-ASCII bytes break `alembic`.
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
