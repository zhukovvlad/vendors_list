name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Types (mypy)
        run: uv run mypy app
      - name: Create Neon test branch
        id: neon
        if: ${{ env.NEON_API_KEY != '' }}
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          parent_branch: production
          branch_name: ci-${{ github.run_id }}-${{ github.run_attempt }}
          api_key: ${{ env.NEON_API_KEY }}
      - name: Migrate test branch
        if: ${{ steps.neon.outcome == 'success' }}
        env:
          MIGRATE_TARGET: test
          DATABASE_URL_TEST: ${{ steps.neon.outputs.db_url_pooled }}?ssl=require
        run: uv run alembic upgrade head
      - name: Tests (pytest)
        env:
          DATABASE_URL_TEST: ${{ steps.neon.outputs.db_url_pooled != '' && format('{0}?ssl=require', steps.neon.outputs.db_url_pooled) || '' }}
        run: uv run pytest -q
      - name: Delete Neon test branch
        if: ${{ always() && steps.neon.outcome == 'success' }}
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: ci-${{ github.run_id }}-${{ github.run_attempt }}
          api_key: ${{ env.NEON_API_KEY }}
      - name: Export OpenAPI
        run: uv run python -m scripts.export_openapi
      - name: Upload OpenAPI schema
        uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: backend/openapi.json

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Download OpenAPI schema
        uses: actions/download-artifact@v4
        with:
          name: openapi
          path: backend
      - name: Generate TS types from OpenAPI
        run: npx --yes openapi-typescript ../backend/openapi.json -o src/api/schema.d.ts
      - name: Lint (eslint)
        run: npm run lint
      - name: Format check (prettier)
        run: npm run format:check
      - name: Typecheck (tsc)
        run: npm run typecheck
      - name: Tests (vitest)
        run: npm run test
      - name: Build
        run: npm run build
